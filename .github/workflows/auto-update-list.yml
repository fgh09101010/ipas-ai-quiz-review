name: Auto Update File List

on:
  push:
    paths:
      - 'data/**'
    branches:
      - main        # push 觸發的分支限制放在這裡
  
  workflow_dispatch: # 這一行後方留空或換行即可，不需要縮排寫分支

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 給予自動提交檔案的權限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Update Script
        run: python update_list.py

      - name: Commit and Push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add filelist.json
          # 檢查是否有變動，避免沒有變動時報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 自動更新題目清單 [skip ci]" && git push)