<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAS 規劃師練習系統 - 個人練習版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .opt-radio:checked + div { border-color: #3b82f6; background-color: #eff6ff; }
        .opt-radio:checked + div .radio-circle { border-color: #3b82f6; border-width: 6px; }
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-blue-200">

    <div class="max-w-3xl mx-auto pt-10 pb-10 px-4">
        <header class="text-center mb-8 fade-in">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-2">
                IPAS 規劃師題庫系統
            </h1>
            <p class="text-slate-500 font-medium mb-2">跨分類測驗 • 自訂題數 • 專屬錯題本</p>
            <div class="inline-block bg-blue-50 border border-blue-100 text-blue-700 text-xs px-3 py-1.5 rounded-full">
                個人練習、非營利、且有明確標註官方來源
            </div>
        </header>

        <div id="setupSection" class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 fade-in">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="bg-blue-100 text-blue-600 p-2 rounded-lg">⚙️</span> 測驗設定
            </h2>
            
            <div class="mb-6 p-4 bg-slate-50 rounded-xl border border-slate-200">
                <label class="block text-sm font-bold text-slate-700 mb-3">1. 測驗題數</label>
                <div class="flex flex-wrap items-center gap-6">
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="qCountType" value="custom" checked class="w-5 h-5 text-blue-600 focus:ring-blue-500 mr-2">
                        <span class="text-slate-600 font-medium group-hover:text-blue-600 transition">隨機抽取</span>
                        <input type="number" id="qCountInput" value="10" min="1" class="ml-2 w-20 border-2 border-slate-300 rounded-lg p-1 text-center focus:border-blue-500 outline-none">
                        <span class="ml-2 text-slate-600">題</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="radio" name="qCountType" value="all" class="w-5 h-5 text-blue-600 focus:ring-blue-500 mr-2">
                        <span class="text-slate-600 font-medium group-hover:text-blue-600 transition">測試全部題目</span>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-slate-700 mb-3">2. 選擇試卷 (支援跨分類多選)</label>
                <div id="fileTree" class="max-h-80 overflow-y-auto pr-2 space-y-3">
                    <p class="text-slate-400 text-sm">讀取題庫資料中...</p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
                <button id="startBtn" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg hover:-translate-y-1 transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    開始測驗 🚀
                </button>
                <button id="reviewBtn" class="flex-1 bg-rose-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-rose-600 hover:shadow-lg transition-all hidden">
                    複習錯題本 (0) 📖
                </button>
            </div>
        </div>

        <div id="quizSection" class="hidden fade-in">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-6">
                <div class="flex justify-between items-end mb-3">
                    <div>
                        <span id="modeLabel" class="text-sm font-bold text-slate-400 uppercase tracking-wider">一般測驗</span>
                        <div id="qCounter" class="text-2xl font-extrabold text-blue-600 mt-1">1 / 10</div>
                    </div>
                    <div id="scoreDisplay" class="text-sm font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">
                        目前得分: 0
                    </div>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5">
                    <div id="progressBar" class="bg-gradient-to-r from-blue-500 to-indigo-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                <h3 id="qText" class="text-xl md:text-2xl font-bold mb-8 leading-snug"></h3>
                <div id="optBox" class="space-y-3 mb-8"></div>
                <div id="ansBox" class="hidden mb-8 p-5 rounded-2xl border-2"></div>

                <div class="flex gap-4">
                    <button id="subBtn" class="flex-1 bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-700 transition-colors">送出答案</button>
                    <button id="nextBtn" class="hidden flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-colors">下一題 ➔</button>
                    <button id="finishBtn" class="hidden flex-1 bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-emerald-600 transition-colors">查看成績 🏆</button>
                </div>
            </div>
        </div>

        <div id="resultSection" class="hidden bg-white p-10 rounded-3xl shadow-sm border border-slate-100 text-center fade-in">
            <h2 class="text-3xl font-extrabold mb-2 text-slate-800">測驗完成！</h2>
            <p class="text-slate-500 mb-8">以下是您的測驗分析報告</p>
            
            <div class="flex justify-center items-center gap-8 mb-10">
                <div class="p-6 bg-blue-50 rounded-3xl w-40">
                    <div class="text-sm text-blue-600 font-bold mb-1">答對題數</div>
                    <div id="finalCorrect" class="text-4xl font-black text-blue-700">0</div>
                </div>
                <div class="p-6 bg-slate-50 rounded-3xl w-40">
                    <div class="text-sm text-slate-500 font-bold mb-1">總題數</div>
                    <div id="finalTotal" class="text-4xl font-black text-slate-700">0</div>
                </div>
            </div>

            <div class="mb-10">
                <div class="text-sm font-bold text-slate-400 mb-2">正確率</div>
                <div id="finalScore" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500">0%</div>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-700 transition-colors">
                🔄 返回主畫面
            </button>
        </div>

        <footer class="mt-12 text-center text-xs text-slate-400 leading-loose fade-in">
            <p>本站資料來源：<a href="https://ipd.nat.gov.tw/ipas/certification/AIAP/learning-resources" target="_blank" class="underline hover:text-blue-500 text-slate-500 transition-colors">經濟部產業人才能力鑑定 (iPAS) 官方網站</a></p>
            <p>聲明：本網站僅供個人練習與非營利學術交流使用，與官方機構無關。</p>
        </footer>
    </div>

    <script>
        let files = [];
        let questions = [];
        let curIdx = 0;
        let score = 0;
        let isReviewMode = false;

        const els = {
            setup: document.getElementById('setupSection'),
            quiz: document.getElementById('quizSection'),
            result: document.getElementById('resultSection'),
            fileTree: document.getElementById('fileTree'),
            startBtn: document.getElementById('startBtn'),
            reviewBtn: document.getElementById('reviewBtn'),
            qCountInput: document.getElementById('qCountInput'),
            modeLabel: document.getElementById('modeLabel'),
            qCounter: document.getElementById('qCounter'),
            scoreDisp: document.getElementById('scoreDisplay'),
            progBar: document.getElementById('progressBar'),
            qText: document.getElementById('qText'),
            optBox: document.getElementById('optBox'),
            ansBox: document.getElementById('ansBox'),
            subBtn: document.getElementById('subBtn'),
            nextBtn: document.getElementById('nextBtn'),
            finishBtn: document.getElementById('finishBtn'),
            finalCorrect: document.getElementById('finalCorrect'),
            finalTotal: document.getElementById('finalTotal'),
            finalScore: document.getElementById('finalScore')
        };

        function getMistakes() { return JSON.parse(localStorage.getItem('ipas_mistakes') || '[]'); }
        function saveMistake(q) {
            let m = getMistakes();
            if (!m.some(x => x.question === q.question)) { m.push(q); localStorage.setItem('ipas_mistakes', JSON.stringify(m)); }
        }
        function removeMistake(q) {
            let m = getMistakes().filter(x => x.question !== q.question);
            localStorage.setItem('ipas_mistakes', JSON.stringify(m));
        }
        function updateReviewBtn() {
            const count = getMistakes().length;
            if (count > 0) { 
                els.reviewBtn.innerText = `複習錯題本 (${count}) 📖`; 
                els.reviewBtn.classList.remove('hidden'); 
            } else {
                els.reviewBtn.classList.add('hidden');
            }
        }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        async function init() {
            updateReviewBtn();
            try {
                const res = await fetch('filelist.json');
                files = await res.json();
                const cats = [...new Set(files.map(f => f.split('_')[0]))];
                els.fileTree.innerHTML = '';

                cats.forEach(cat => {
                    const catFiles = files.filter(f => f.startsWith(cat));
                    let html = `
                        <div class="border border-slate-200 rounded-xl overflow-hidden bg-white mb-2">
                            <label class="flex items-center p-3 bg-slate-100/50 border-b border-slate-200 cursor-pointer hover:bg-blue-50 transition">
                                <input type="checkbox" class="cat-cb w-5 h-5 text-blue-600 rounded focus:ring-blue-500 mr-3" data-cat="${cat}">
                                <span class="font-bold text-slate-800">${cat} <span class="text-sm font-normal text-slate-500">(全選)</span></span>
                            </label>
                            <div class="p-3 grid grid-cols-1 sm:grid-cols-2 gap-2">
                    `;
                    catFiles.forEach(f => {
                        const name = f.split('_')[1] ? f.split('_')[1].replace('.json','') : f;
                        html += `
                            <label class="flex items-center p-2 rounded-lg cursor-pointer hover:bg-slate-50 transition">
                                <input type="checkbox" value="${f}" class="file-cb file-cb-${cat} w-4 h-4 text-blue-600 rounded mr-3">
                                <span class="text-slate-600 text-sm font-medium">${name}</span>
                            </label>
                        `;
                    });
                    html += `</div></div>`;
                    els.fileTree.innerHTML += html;
                });
                bindCheckboxEvents();
            } catch (e) {
                els.fileTree.innerHTML = '<p class="text-rose-500">⚠️ 讀取失敗，請確認 filelist.json 是否存在。</p>';
            }
        }

        function bindCheckboxEvents() {
            document.querySelectorAll('.cat-cb').forEach(catCb => {
                catCb.addEventListener('change', (e) => {
                    const cat = e.target.getAttribute('data-cat');
                    document.querySelectorAll(`.file-cb-${cat}`).forEach(fileCb => fileCb.checked = e.target.checked);
                    updateStartBtn();
                });
            });
            document.querySelectorAll('.file-cb').forEach(fileCb => {
                fileCb.addEventListener('change', (e) => {
                    const cat = Array.from(e.target.classList).find(c => c.startsWith('file-cb-')).replace('file-cb-', '');
                    const allInCat = document.querySelectorAll(`.file-cb-${cat}`);
                    const checkedInCat = document.querySelectorAll(`.file-cb-${cat}:checked`);
                    document.querySelector(`.cat-cb[data-cat="${cat}"]`).checked = (allInCat.length === checkedInCat.length);
                    updateStartBtn();
                });
            });
        }

        function updateStartBtn() {
            const count = document.querySelectorAll('.file-cb:checked').length;
            els.startBtn.disabled = count === 0;
            els.startBtn.innerText = count > 0 ? `開始測驗 (${count} 份試卷) 🚀` : '開始測驗 🚀';
        }

        function prepareQuestions(rawQuestions) {
            let shuffled = shuffleArray(rawQuestions);
            const countType = document.querySelector('input[name="qCountType"]:checked').value;
            if (countType === 'custom') {
                const reqCount = parseInt(els.qCountInput.value);
                if (reqCount && reqCount > 0) return shuffled.slice(0, Math.min(reqCount, shuffled.length));
            }
            return shuffled;
        }

        els.startBtn.onclick = async () => {
            isReviewMode = false;
            els.modeLabel.innerText = "一般測驗";
            els.modeLabel.className = "text-sm font-bold text-slate-400 uppercase tracking-wider";
            els.startBtn.innerText = "讀取中...";
            try {
                const selectedFiles = Array.from(document.querySelectorAll('.file-cb:checked')).map(cb => cb.value);
                const promises = selectedFiles.map(file => fetch(`./data/${file}`).then(r => r.json()));
                const results = await Promise.all(promises);
                questions = prepareQuestions(results.flat());
                startQuizMode();
            } catch (e) {
                alert("讀取題目失敗！");
                updateStartBtn();
            }
        };

        els.reviewBtn.onclick = () => {
            isReviewMode = true;
            els.modeLabel.innerText = "🔥 錯題複習模式";
            els.modeLabel.className = "text-sm font-bold text-rose-500 uppercase tracking-wider";
            questions = prepareQuestions(getMistakes());
            startQuizMode();
        };

        function startQuizMode() {
            if(questions.length === 0) { alert("沒有找到任何題目！"); return; }
            curIdx = 0; score = 0;
            els.setup.classList.add('hidden');
            els.quiz.classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[curIdx];
            els.qCounter.innerText = `${curIdx + 1} / ${questions.length}`;
            els.progBar.style.width = `${((curIdx) / questions.length) * 100}%`;
            els.scoreDisp.innerText = `目前得分: ${score}`;
            els.qText.innerText = q.question;
            els.optBox.innerHTML = '';
            q.options.forEach((opt, i) => {
                els.optBox.innerHTML += `
                    <label class="relative block cursor-pointer group">
                        <input type="radio" name="quiz" value="${i}" class="opt-radio absolute opacity-0 w-0 h-0">
                        <div class="flex items-center p-4 border-2 border-slate-100 rounded-2xl transition-all group-hover:border-blue-200 group-hover:bg-blue-50/50">
                            <div class="radio-circle w-6 h-6 rounded-full border-2 border-slate-300 mr-4 transition-all"></div>
                            <span class="text-slate-700 font-medium text-lg leading-relaxed">${opt}</span>
                        </div>
                    </label>`;
            });
            els.ansBox.classList.add('hidden');
            els.subBtn.classList.remove('hidden');
            els.nextBtn.classList.add('hidden');
            els.finishBtn.classList.add('hidden');
        }

        els.subBtn.onclick = () => {
            const sel = document.querySelector('input[name="quiz"]:checked');
            if (!sel) return alert("請先選擇一個選項！");
            const q = questions[curIdx];
            const isCorrect = parseInt(sel.value) === q.answer;
            if (isCorrect) { score++; if (isReviewMode) removeMistake(q); } else { saveMistake(q); }
            els.ansBox.className = `mb-8 p-5 rounded-2xl border-2 fade-in ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`;
            els.ansBox.innerHTML = `
                <div class="flex items-center gap-2 mb-2 font-bold text-lg ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}">
                    ${isCorrect ? '✅ 答對了！' : '❌ 答錯了！正確答案是：' + q.options[q.answer]}
                </div>
                <div class="text-slate-600 mt-2 pt-2 border-t border-slate-200/60 leading-relaxed">
                    <span class="font-bold text-sm text-slate-500 block mb-1">【詳解】</span>
                    ${q.analysis || '無提供詳解。'}
                </div>`;
            els.ansBox.classList.remove('hidden');
            els.subBtn.classList.add('hidden');
            if (curIdx < questions.length - 1) els.nextBtn.classList.remove('hidden'); else els.finishBtn.classList.remove('hidden');
            document.querySelectorAll('.opt-radio').forEach(r => r.disabled = true);
        };

        els.nextBtn.onclick = () => { curIdx++; renderQuestion(); };
        els.finishBtn.onclick = () => {
            els.quiz.classList.add('hidden');
            els.result.classList.remove('hidden');
            els.finalCorrect.innerText = score;
            els.finalTotal.innerText = questions.length;
            els.finalScore.innerText = `${Math.round((score / questions.length) * 100)}%`;
        };
        els.qCountInput.addEventListener('focus', () => document.querySelector('input[name="qCountType"][value="custom"]').checked = true);
        init();
    </script>
</body>
</html>
